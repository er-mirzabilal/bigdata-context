<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 30" width="260" height="30" role="img" aria-label="Big Context &amp; Company">
  <title>Big Context &amp; Company</title>
  <!-- bc mark icon scaled 0.25× from 160×120 → 40×30 -->
  <g transform="scale(0.25)">
    <rect x="30" y="20" width="10" height="80" fill="#c79df0"/>
    <rect x="30" y="20" width="28" height="6" fill="#c79df0"/>
    <rect x="30" y="94" width="28" height="6" fill="#c79df0"/>
    <rect x="66" y="55" width="28" height="10" fill="#efe9f2"/>
    <rect x="120" y="20" width="10" height="80" fill="#c79df0"/>
    <rect x="102" y="20" width="28" height="6" fill="#c79df0"/>
    <rect x="102" y="94" width="28" height="6" fill="#c79df0"/>
  </g>
  <!-- wordmark: icon 40px wide + 8px gap = x:48 -->
  <text x="48" y="21" font-family="'Fraunces', Georgia, serif" font-size="18" font-weight="500" letter-spacing="-0.36" fill="#efe9f2">Big Context<tspan font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8" dy="-6" dx="1" fill="#9a8aa8">™</tspan><tspan dy="6" font-size="18" font-weight="300" font-style="italic" fill="#efe9f2" fill-opacity="0.6"> &amp; Company</tspan></text>
</svg>
